server:
  port: 8220

otel:
  sdk:
    disabled: true

popp:
  http:
    # Port must match PORT_POPP_CLIENT in doc/docker/.env (default: 8081)
    url: http://localhost:${PORT_POPP_CLIENT:8081}/token
  ws:
    url: ws://127.0.0.1:9110

vsdm:
  # Port must match PORT_VSDM_ZETA_PEP in doc/docker/.env (default: 9120)
  resourceServerUrl: http://localhost:${PORT_VSDM_ZETA_PEP:9120}
  use-mock-popp-token: true
  # Port must match PORT_POPP_TOKEN_GENERATOR in doc/docker/.env (default: 9500)
  popp-token-generator-url: http://localhost:${PORT_POPP_TOKEN_GENERATOR:9500}

zetasdk:
  smcbAlias: "alias"
  smcbPrivateKeyPassword: "00"
  smcbPrivateKeyPath: "doc/docker/backend/zeta/smcb-private/smcb_private.p12"
  intercept-storage: true
