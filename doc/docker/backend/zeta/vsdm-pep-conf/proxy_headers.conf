# proxy_headers.conf
#
# Include this in EVERY pep-protected `proxy_pass` location. The PEP enforces the include at
# request time: a proxied location missing it returns HTTP 500 (ProxyHeadersMissing) instead of
# silently forwarding client credentials upstream.
#
# IMPORTANT: nginx's `proxy_set_header` inheritance is non-additive — a location that declares
# *any* `proxy_set_header` of its own does NOT inherit the parent's set. So if you add your own
# `proxy_set_header` in a (nested) location, you MUST re-`include proxy_headers.conf` there too,
# or these strips are dropped. The PEP's sentinel check below catches a fully-missing include;
# re-including on customization is on you.

# Credentials the PEP consumes (Authorization / DPoP / PoPP) authenticate the client *to the
# PEP*; they are not meant for the upstream. Empty value → the header is omitted from the
# upstream request, and the name in the proxy header set drops any client-supplied copy.
proxy_set_header authorization "";
proxy_set_header dpop "";
proxy_set_header popp "";

# this is a response header that shouldn't be forwarded upstream
proxy_set_header ZETA-API-Version        "";

# The ZETA-* headers the PEP injects: the value comes from a PEP-set nginx variable (empty when
# the PEP didn't set it this request → header omitted). Naming each here ALSO drops any
# client-supplied copy of that name — the PEP is the sole source (A_25669-01). ZETA-API-Version
# is a response header the PEP sets separately, so on the request path it is only stripped.
proxy_set_header ZETA-User-Info          $zeta_user_info;
proxy_set_header ZETA-Client-Data        $zeta_client_data;
proxy_set_header ZETA-PoPP-Token-Content $zeta_popp_token_content;
proxy_set_header Forwarded               $zeta_forwarded;

# Enforcement sentinel. The empty value means it is never forwarded; the PEP only checks that
# its *name* is present in this location's compiled proxy header set. Keep it lowercase.
proxy_set_header x-zeta-headers-applied "";
