server {
  listen 443 ssl;
  server_name  vsdm-zeta-ingress;

  # Dual-Zertifikat: RSA und ECDSA. nginx wählt anhand der vom Client
  # angebotenen Cipher-Suiten das passende Zertifikat (ECDSA-Suiten gemäß
  # TR-02102-2 erfordern ein ECDSA-Server-Zertifikat).
  ssl_certificate     /etc/nginx/certs/nginx.crt;
  ssl_certificate_key /etc/nginx/certs/nginx.key;
  ssl_certificate     /etc/nginx/certs/nginx-ecdsa.crt;
  ssl_certificate_key /etc/nginx/certs/nginx-ecdsa.key;

  location /auth {
    proxy_pass                                  http://vsdm-zeta-pdp/auth;
    proxy_set_header X-Forwarded-Host           $server_name;
    proxy_set_header X-Forwarded-Proto          $scheme;
  }

  location / {
    proxy_pass                                  http://vsdm-zeta-pep/;
    proxy_set_header X-Forwarded-Host           $server_name;
    proxy_set_header X-Forwarded-Proto          $scheme;
  }
}
