x-vsdm-no-proxy-env: &vsdm-no-proxy-env
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  ALL_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  NO_PROXY: "localhost,127.0.0.1,vsdm-zeta-ingress,vsdm-zeta-pep,vsdm-zeta-pdp,vsdm-zeta-pdp-opa,vsdm-server"
  no_proxy: "localhost,127.0.0.1,vsdm-zeta-ingress,vsdm-zeta-pep,vsdm-zeta-pdp,vsdm-zeta-pdp-opa,vsdm-server"

services:
  vsdm-zeta-ingress:
    container_name: vsdm-zeta-ingress
    image: "nginx:1.29.7"
    env_file:
      - path: ../.env
        required: true
    platform: linux/amd64
    ports:
      - "${PORT_VSDM_ZETA_INGRESS:?PORT_VSDM_ZETA_INGRESS missing – set it in doc/docker/.env}:443"
    volumes:
      - ./zeta/ingress/conf:/etc/nginx/conf.d:ro
      - ./zeta/ingress/certs:/etc/nginx/certs:ro
    depends_on:
      - vsdm-zeta-pep
    networks:
      - testhub_backend

  vsdm-server:
    container_name: vsdm-server
    image: de.gematik.ti20.simsvc.server/vsdm-server-simservice:local
    env_file:
      - path: ../.env
        required: true
    ports:
      - "${PORT_VSDM_SERVER:?PORT_VSDM_SERVER missing – set it in doc/docker/.env}:80"
      - "${PORT_VSDM_SERVER_DEBUG:?PORT_VSDM_SERVER_DEBUG missing – set it in doc/docker/.env}:5012"
    # volumes:
    #   - type: bind
    #     source: /tmp/testhub/test-data
    #     target: /opt/custom-test-data
    environment:
      - LOGGING_LEVEL_ROOT=INFO
      - OTEL_SERVICE_NAME=vsdm-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - JAVA_TOOL_OPTIONS="-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5012"
      # - VSDM_PATH_TO_TEST_DATA=/opt/custom-test-data
    networks:
      - testhub_backend

  vsdm-zeta-pep:
    image: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/ngx_pep:1.0.1
    env_file:
      - path: ../.env
        required: true
    platform: linux/amd64
    container_name: vsdm-zeta-pep
    environment: *vsdm-no-proxy-env
    ports:
      - "${PORT_VSDM_ZETA_PEP:?PORT_VSDM_ZETA_PEP missing – set it in doc/docker/.env}:80"
    volumes:
      - ./zeta/vsdm-zeta-pep.conf:/etc/nginx/nginx.conf:ro
      - ./zeta/well-known/oauth-protected-resource:/srv/.well-known/oauth-protected-resource:ro
      - ./zeta/asl/:/etc/nginx/asl/
    depends_on:
      vsdm-zeta-pdp:
        condition: service_healthy
      vsdm-server:
        condition: service_started # TODO: change to "service_healthy" when healthcheck is available
    networks:
      - testhub_backend

  vsdm-zeta-pdp:
    image: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/keycloak-zeta:1.0.1
    env_file:
      - path: ../.env
        required: true
    platform: linux/amd64
    container_name: vsdm-zeta-pdp
    environment:
      <<: *vsdm-no-proxy-env
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: true
      GENESIS_HASH: "4841c2142fef441daa6ee6c57db65c011935964b14e94a6c8f5ec0447b83526c"
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://vsdm-zeta-pdp-db:5432/keycloak?sslmode=disable"
      KC_DB_USERNAME: "keycloak_db_user"
      KC_DB_PASSWORD: "keycloak_db_user_password"
      KC_DB_SCHEMA: "public"
      KC_HTTP_PORT: 80
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME: https://vsdm-zeta-ingress/auth/
      # KC_HOSTNAME: https://127.0.0.1:9119/auth
      PROXY_ADDRESS_FORWARDING: true
      # KEYCLOAK_FRONTEND_URL: https://vsdm-zeta-ingress/auth
      # KEYCLOAK_FRONTEND_URL: https://127.0.0.1:9119/auth
      KC_HEALTH_ENABLED: true
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_LOG_LEVEL: INFO
      SMCB_KEYSTORE_LOCATION: /opt/keycloak/conf/smcb/truststore.p12
      SMCB_KEYSTORE_PASSWORD: "changeit"
      SMCB_HASHING_PEPPER: "-085c1245-dc0d-4d39-95b4-97496bec6182"
      TPM_KEYSTORE_LOCATION: /opt/keycloak/conf/tpm/tpm-certificates.p12
      TPM_KEYSTORE_PASSWORD: "O3Bdel9P5+cOgzIGANkOPEzBQM3V"
      KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_ENABLED: true
      KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_OPA_BASE_URL: http://vsdm-zeta-pdp-opa:8181
      KC_SPI_TOKEN_EXCHANGE_PROVIDER_ZETA_SMC_B_TOKEN_EXCHANGE_DECISION_PATH: "/v1/data/zeta/authz/decision"
      CHECK_CLIENT_ATTESTATION_ENABLED: true
      DEBUG: "false"
      DEBUG_PORT: "*:5022"
    ports:
      - "${PORT_VSDM_ZETA_PDP:?PORT_VSDM_ZETA_PDP missing – set it in doc/docker/.env}:80"
      - "${PORT_VSDM_ZETA_PDP_HEALTH:?PORT_VSDM_ZETA_PDP_HEALTH missing – set it in doc/docker/.env}:9000"
      - "${PORT_VSDM_ZETA_PDP_DEBUG:?PORT_VSDM_ZETA_PDP_DEBUG missing – set it in doc/docker/.env}:5022"
    volumes:
      - ./zeta/realm:/opt/keycloak/data/import
      - ./zeta/smcb:/opt/keycloak/conf/smcb
      - ./zeta/tpm/:/opt/keycloak/conf/tpm
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e \"GET /auth/health/live HTTP/1.1\r\nhost: localhost:9000\r\nConnection: close\r\n\r\n\" >&3;grep \"status.*UP\" <&3" ]
      start_period: 120s
      interval: 5s
      timeout: 5s
      retries: 30
    command: [ "start-dev","--import-realm" ] # ,"--http-relative-path=/auth","--hostname-strict=false"
    depends_on:
      - vsdm-zeta-pdp-db
    networks:
      - testhub_backend

  vsdm-zeta-pdp-db:
    container_name: vsdm-zeta-pdp-db
    image: postgres:16.2
    env_file:
      - path: ../.env
        required: true
    platform: linux/amd64
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak_db_user
      POSTGRES_PASSWORD: keycloak_db_user_password
    networks:
      - testhub_backend

  vsdm-zeta-pdp-opa:
    image: europe-west3-docker.pkg.dev/gematik-pt-zeta-prod/zeta-dcr/opa:1.14.1-static
    env_file:
      - path: ../.env
        required: true
    platform: linux/amd64
    environment: *vsdm-no-proxy-env
    ports:
      - "${PORT_VSDM_ZETA_PDP_OPA:?PORT_VSDM_ZETA_PDP_OPA missing – set it in doc/docker/.env}:8181"
    command:
      - 'run'
      - '--server'
      - '--log-level=debug'
      - '--addr=0.0.0.0:8181'
      - '/policies/authz.rego'
    volumes:
      - ./zeta/policies/authz.rego:/policies/authz.rego:ro
    networks:
      - testhub_backend

volumes:
  postgres_data:
    driver: local

networks:
  testhub_backend:
