name: "testhub-local"

include:
  - ./backend/compose-backend.yaml

networks:
  testhub_client:
  testhub_backend:

x-no-proxy-env: &no-proxy-env
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  ALL_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  NO_PROXY: "localhost,127.0.0.1,card-terminal-client,docker-tiger-proxy,ti-connect-tiger-proxy,popp-client,popp-token-generator,popp-zeta-ingress,popp-zeta-pep,popp-zeta-pdp,popp-zeta-pdp-opa,vsdm-zeta-ingress,vsdm-zeta-pep,vsdm-zeta-pdp,vsdm-zeta-pdp-opa,vsdm-server"
  no_proxy: "localhost,127.0.0.1,card-terminal-client,docker-tiger-proxy,ti-connect-tiger-proxy,popp-client,popp-token-generator,popp-zeta-ingress,popp-zeta-pep,popp-zeta-pdp,popp-zeta-pdp-opa,vsdm-zeta-ingress,vsdm-zeta-pep,vsdm-zeta-pdp,vsdm-zeta-pdp-opa,vsdm-server"

# Profiles:
#   full          - Backend + Tiger-Proxies + Clients (via tiger-proxy) [default]
#   backend-only  - Backend only (no tiger-proxies, no clients)
#   perf          - Backend + Tiger-Proxies + Clients (direct backend access, bypassing proxy)
#
# Usage:
#   docker compose --profile full up           # full stack (default)
#   docker compose --profile backend-only up   # backend only
#   docker compose --profile perf up           # with clients direct (performance testing)

# ==================== Services ====================

services:
  card-terminal-client-base:
    profiles: [ "abstract" ]
    build: ../../client/card-terminal-client-simservice
    env_file:
      - path: .env
        required: true
    image: de.gematik.ti20.simsvc.client/card-terminal-client-simservice:local
    container_name: card-terminal-client
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/service/status" ]
      interval: 10s
      timeout: 10s
      retries: 3
    ports:
      - "${PORT_CARD_TERMINAL_CLIENT:?PORT_CARD_TERMINAL_CLIENT missing – set it in doc/docker/.env}:80"
      - "${PORT_CARD_TERMINAL_CLIENT_DEBUG:?PORT_CARD_TERMINAL_CLIENT_DEBUG missing – set it in doc/docker/.env}:5005"
    environment:
      <<: *no-proxy-env
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

  vsdm-client-base:
    profiles: [ "abstract" ]
    build: ../../client/vsdm-client-simservice-java
    env_file:
      - path: .env
        required: true
    image: de.gematik.ti20.simsvc.client/vsdm-client-simservice:local
    container_name: vsdm-client
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/service/status" ]
      interval: 10s
      timeout: 10s
      retries: 3
    ports:
      - "${PORT_VSDM_CLIENT:?PORT_VSDM_CLIENT missing – set it in doc/docker/.env}:80"
      - "${PORT_VSDM_CLIENT_DEBUG:?PORT_VSDM_CLIENT_DEBUG missing – set it in doc/docker/.env}:5006"
    volumes:
      - ./backend/zeta/smcb-private/smcb_private.p12:/tmp/zeta/smcb_private.p12:ro
    environment:
      <<: *no-proxy-env
      VSDM_USE_MOCK_POPP_TOKEN: "true"
      INTERCEPT_STORAGE: "false"
      POPP_HTTP_URL: http://popp-client:8081/token
      POPP_TOKEN_GENERATOR_URL: http://popp-token-generator:80
      VSDM_RESOURCE_SERVER_URL: https://vsdm-zeta-ingress
      OTEL_SERVICE_NAME: vsdm-client
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006
      ZETASDK_SMCB_ALIAS: alias
      ZETASDK_SMCB_PRIVATE_KEY_PASSWORD: "00"
      ZETASDK_SMCB_PRIVATE_KEY_PATH: /tmp/zeta/smcb_private.p12

  docker-tiger-proxy:
    image: gematik1/tiger-proxy-image:4.2.7
    env_file:
      - path: .env
        required: true
    platform: linux/amd64
    container_name: docker-tiger-proxy
    environment: *no-proxy-env
    networks:
      testhub_client:
        aliases:
          - popp-ru-dev-interim.int.epa.rise-link.de
          - popp-zeta-ingress
          - popp-zeta-pep
          - popp-zeta-pdp
          - popp-token-generator
          - vsdm-zeta-ingress
      testhub_backend:
    ports:
      - "${PORT_BACKEND_TIGER_PROXY:?PORT_BACKEND_TIGER_PROXY missing – set it in doc/docker/.env}:8080"
      - "${PORT_BACKEND_TIGER_PROXY_ADMIN:?PORT_BACKEND_TIGER_PROXY_ADMIN missing – set it in doc/docker/.env}:9090"
    volumes:
      - ./remoteTigerProxy/application.yaml:/app/application.yaml:ro
      - ./remoteTigerProxy/tigerProxy.p12:/app/tigerProxy.p12:ro

  ti-connect-tiger-proxy:
    image: gematik1/tiger-proxy-image:4.2.7
    env_file:
      - path: .env
        required: true
    profiles: [ "full" ]
    platform: linux/amd64
    container_name: ti-connect-tiger-proxy
    environment: *no-proxy-env
    networks:
      testhub_backend:
    ports:
      - "${PORT_TI_CONNECT_TIGER_PROXY:?PORT_TI_CONNECT_TIGER_PROXY missing – set it in doc/docker/.env}:8080"
      - "${PORT_TI_CONNECT_TIGER_PROXY_ADMIN:?PORT_TI_CONNECT_TIGER_PROXY_ADMIN missing – set it in doc/docker/.env}:9090"
    volumes:
      - ./tiConnectTigerProxy/application.yaml:/app/application.yaml:ro
      - ./tiConnectTigerProxy/tigerProxy.p12:/app/tigerProxy.p12:ro

  # ==================== Default (via tiger-proxy) ====================

  card-terminal-client:
    extends:
      service: card-terminal-client-base
    profiles: [ "full" ]
    networks:
      - testhub_client

  vsdm-client:
    extends:
      service: vsdm-client-base
    profiles: [ "full" ]
    environment:
      - VSDM_USE_MOCK_POPP_TOKEN=false
    networks:
      - testhub_client

  # ==================== Perf Profile (direct backend access) ====================

  card-terminal-client-perf:
    extends:
      service: card-terminal-client-base
    profiles: [ "perf" ]
    networks:
      - testhub_backend

  vsdm-client-perf:
    extends:
      service: vsdm-client-base
    profiles: [ "perf" ]
    environment:
      - INTERCEPT_STORAGE=true
    networks:
      - testhub_backend
