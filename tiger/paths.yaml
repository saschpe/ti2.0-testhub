# Base paths used in ZeTA features
zeta:
  paths:
    guard:
      tokenEndpointPath: /token
      registerEndpointPath: /register
      wellKnownOAuthProtectedResourcePath: /.well-known/oauth-protected-resource
      actuatorHealthPath: /mocked/actuator/health
    opa:
      decisionPath: /v1/data/zeta/authz/decision
    client:
      reset: http://${ports.host}:${ports.vsdmClientPort}/client/config/terminal
      # VSD-Anfrage an VSDM Fachdienst über ZeTA Client (direkt ohne TigerProxy)
      vsdRequest: http://${ports.host}:${ports.vsdmClientPort}/client/vsdm/vsd?terminalId=1&egkSlotId=1&smcBSlotId=1
      vsdRequestPath: /client/vsdm/vsd
      # Status-Anfrage geht direkt zum ZeTA Client (VSDM Client) ohne TigerProxy
      status: http://${ports.host}:${ports.vsdmClientPort}/service/status
      statusPath: /service/status
    tigerProxy:
      # TigerProxy Admin API (siehe ports.yaml: localTigerProxyAdminPort)
      baseUrl: http://localhost:${ports.localTigerProxyAdminPort}
      modificationPath: /modification
      resetJwtManipulationPath: /api/rbel/jwtManipulation/reset
      modifyJwsTokenPath: /api/rbel/jwtManipulation
      modifyJwtPath: /api/rbel/jwt
      keyPath: /api/keys
    erezept:
      rest:
        proxyPath: /achelos_testfachdienst/erezept
        pepPath: /achelos_testfachdienst/erezept
    vsdm:
      ingress:
        baseUrl: https://${ports.host}:${ports.vsdmIngressPort}
      pep:
        baseUrl: http://${ports.host}:${ports.vsdmPepPort}
      pdp:
        baseUrl: http://${ports.host}:${ports.vsdmPdpPort}
      wellKnownOAuthProtectedResourcePath: /.well-known/oauth-protected-resource
      wellKnownOAuthServerPath: /.well-known/oauth-authorization-server
      registerEndpointPath: /auth/realms/zeta-guard/clients-registrations/openid-connect
      tokenEndpointPath: /auth/realms/zeta-guard/protocol/openid-connect/token
      nonceEndpointPath: /auth/realms/zeta-guard/zeta-guard-nonce
