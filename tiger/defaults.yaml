smoke:
  endpoints:
    poppZetaPdp:
      url: http://127.0.0.1:${ports.poppPdpPort}/auth/realms/zeta-guard/.well-known/openid-configuration
      path: /auth/realms/zeta-guard/.well-known/openid-configuration
      name: PoPP ZeTA PDP
    poppZetaPep:
      url: http://127.0.0.1:${ports.poppPepPort}/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: PoPP ZeTA PEP
    poppZetaIngress:
      url: https://localhost:11443/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: PoPP ZETA Ingress
    vsdmZetaIngress:
      url: https://127.0.0.1:9119/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: VSDM ZeTA Ingress
    vsdmZetaPep:
      url: http://127.0.0.1:9120/
      path: /
      name: VSDM ZeTA PEP
    vsdmZetaPdp:
      url: http://127.0.0.1:9122
      path: /
      name: VSDM ZeTA PDP

zeta:
  server:
    popp:
      url: http://127.0.0.1:9500
    poppTokenGenerator:
      url: http://127.0.0.1:9500
    pdp:
      tokenUrl: http://127.0.0.1:${ports.poppPdpPort}/auth/realms/zeta-guard/protocol/openid-connect/token
      # Keycloak issuer – used as 'aud' in client_assertion JWTs (must match KC_HOSTNAME + realm)
      issuer: https://vsdm-zeta-ingress/auth/realms/zeta-guard
    opa:
      baseUrl: http://127.0.0.1:2401
  timeouts:
    httpRequestSeconds: 10
    healthCheckSeconds: 20
    healthCheckPollIntervalMs: 250
    wsConnectionSeconds: 10
    wsMessageSeconds: 10

# ZETA Guard Ingress base URL (ohne Schema – wird von Tests mit https:// ergänzt)
zeta_base_url: "localhost:9119"


