smoke:
  endpoints:
    poppZetaPdp:
      url: http://${ports.host}:${ports.poppPdpPort}/auth/realms/zeta-guard/.well-known/openid-configuration
      path: /auth/realms/zeta-guard/.well-known/openid-configuration
      name: PoPP ZeTA PDP
    poppZetaPep:
      url: http://${ports.host}:${ports.poppPepPort}/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: PoPP ZeTA PEP
    poppZetaIngress:
      url: https://localhost:11443/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: PoPP ZETA Ingress
    vsdmZetaIngress:
      url: https://${ports.host}:${ports.vsdmIngressPort}/.well-known/oauth-protected-resource
      path: /.well-known/oauth-protected-resource
      name: VSDM ZeTA Ingress
    vsdmZetaPep:
      url: http://${ports.host}:${ports.vsdmPepPort}/
      path: /
      name: VSDM ZeTA PEP
    vsdmZetaPdp:
      url: http://${ports.host}:${ports.vsdmPdpPort}
      path: /
      name: VSDM ZeTA PDP

zeta:
  env: "local"
  server:
    popp:
      url: http://${ports.host}:9500
    poppClient:
      url: http://${ports.host}:8081
    poppTokenGenerator:
      url: http://${ports.host}:9500
    pdp:
      tokenUrl: http://${ports.host}:${ports.poppPdpPort}/auth/realms/zeta-guard/protocol/openid-connect/token
      issuer: https://popp-zeta-ingress/auth/realms/zeta-guard
      realmUrl: http://${ports.host}:${ports.poppPdpPort}/auth/realms/zeta-guard
      dcrUrl: http://${ports.host}:${ports.poppPdpPort}/auth/realms/zeta-guard/clients-registrations/openid-connect
      jwksUrl: http://${ports.host}:${ports.poppPdpPort}/auth/realms/zeta-guard/protocol/openid-connect/certs
      nonceUrl: http://${ports.host}:${ports.poppPdpPort}/auth/realms/zeta-guard/zeta-guard-nonce
      smcbAudience: https://popp-zeta-ingress/auth/
      clientAssertionAud: https://popp-zeta-ingress/auth/realms/zeta-guard/protocol/openid-connect/token
    pep:
      url: http://${ports.host}:${ports.poppPepPort}
    opa:
      baseUrl: http://${ports.host}:2401
  timeouts:
    httpRequestSeconds: 10
    healthCheckSeconds: 20
    healthCheckPollIntervalMs: 250
    wsConnectionSeconds: 10
    wsMessageSeconds: 10

# ZETA Guard Ingress base URL (ohne Schema – wird von Tests mit https:// ergänzt)
zeta_base_url: "${ports.host}:${ports.vsdmIngressPort}"
