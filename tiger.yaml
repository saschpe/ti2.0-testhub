tigerProxy:
  proxyPort: ${ports.localTigerProxyProxyPort}
  adminPort: ${ports.localTigerProxyAdminPort}
  activateRbelParsingFor:
    - websocket
    - x509
    - asl
  keyFolders:
    - ${tiger.rootFolder|.}/test/vsdm-testsuite
    - ${tiger.rootFolder|.}/test/zeta-testsuite/src/test/resources
    - ${tiger.rootFolder|.}/doc/docker/backend/zeta/smcb-private
    - ${tiger.rootFolder|.}/doc/docker/backend/zeta/smcb

lib:
  workflowUiPort: ${ports.tigerWorkflowUiPort}
  rbelPathDebugging: false
  activateWorkflowUi: true # Set to false for headless execution (e.g. in CI)
  workflowUiStartTimeoutInSeconds: 120
  trafficVisualization: true
  httpClientConfig:
    activateRbelWriter: true
  logging.level:
    de.gematik.test.tiger: INFO
  additionalKeyStorePasswords:
    ["testpassword", "changeit", "00", "popp-store"]

fhir:
  encoded: json

popp.client.url: "http://localhost:8081/token"

additionalConfigurationFiles:
  - filename: tiger/defaults.yaml
  - filename: tiger/ports.yaml
  - filename: tiger/flags.yaml
  - filename: tiger/paths.yaml
  - filename: tiger/tiger-${env|default}.yaml
    baseKey: tiger
